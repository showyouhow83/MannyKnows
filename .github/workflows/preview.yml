name: Preview Deploy (branch)

# Deploys the current branch to a SEPARATE preview Worker (mannyknows-preview)
# with no production routes, so mannyknows.com is never touched. For reviewing
# the Astro 7 / Tailwind 4 migration on a real *.workers.dev URL before merging.
on:
  push:
    branches: [claude/hopeful-turing-chLPC]
  workflow_dispatch:

concurrency:
  group: preview-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Prepare preview config (separate worker, no prod routes)
        run: |
          node -e "const fs=require('fs');const c=require('./dist/server/wrangler.json');c.name='mannyknows-preview';delete c.routes;c.workers_dev=true;fs.writeFileSync('./dist/server/wrangler.preview.json',JSON.stringify(c));console.log('Preview worker:',c.name)"
      - name: Deploy preview
        run: npx wrangler deploy -c dist/server/wrangler.preview.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
