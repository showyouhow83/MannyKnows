name: Deploy to Cloudflare Workers

# Builds and deploys the production Worker whenever `main` updates — e.g. when
# you merge a branch. Also runnable on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          # Repo → Settings → Secrets and variables → Actions
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Optional — only needed if your API token can see more than one account
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
